add_newline = false
format = """
[вЦСвЦТвЦУ](#92edf9)\
[ у∞£З ](bg:#92edf9 fg:#373940)\
[оВі](bg:#a8ddfa fg:#92edf9)\
$directory\
[оВі](fg:#a8ddfa bg:#beccfc)\
$git_branch\
$git_status\
[оВі](fg:#beccfc bg:#d3bcfd)\
[оВі](fg:#d3bcfd bg:#e9acff)\
[оВ∞ ](fg:#e9acff)\
"""

[directory]
style = "fg:#373940 bg:#a8ddfa"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пД¶"
style = "bg:#beccfc"
format = '[[ $symbol $branch ](fg:#394260 bg:#beccfc)]($style)'

[git_status]
style = "bg:#beccfc"
format = '[[($all_status$ahead_behind )](fg:#394260 bg:#beccfc)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#e9acff"
format = '[[ пАЧ $time ](fg:#373940 bg:#e9acff)]($style)'

